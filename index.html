<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Vida de Sofi</title>
  
  <link rel="stylesheet" href="estilo.css">
  
</head>
<body>
  <h1 class="titulo-centrado">La Vida de Sofi</h1>
  <div class="formulario-container">  <h2>📑Registrate para conocerme</h2>
    <p style= "text-align: center; color: #666; margin-buttom: 2rem;">
      completa el formulario y forma parte de esta experiencia
    </p>
    <from id="fromVista">
      <div class="from-grooup">
        <label for="nommbre">Nombre*</label>
        <input type="text" id="nombre" name="nombre" required placeholder="Ej:Lautaro">
      </div>
      
      <div class="from-grooup">
        <label for="nommbre">Apellido*</label>
        <input type="text" id="apellido" name="apellido" required placeholder="Ej:Gómez">
      </div>

      <div class="from-grooup">
        <label for="nommbre">Relación con Sofi*</label>
        <input type="text" id="relacion" name="relacion" required placeholder="Ej:amigo, familiar, compañero">
      </div>

      <buttom type="submit"class="btn-enviar" id="btnEnviar"> Enviar Registro</buttom>
    </from>
    <div id="mensaje" class="mensaje"></div>
  </div>
    
  <p>¿Querés conocer más a Sofi?</p>
  <p>¿Saber sobre sus gustos y su historia?</p>
  <p>Aqui tienes de todo: fotos, gustos musicales, etc.</p>
</body>
</html>
